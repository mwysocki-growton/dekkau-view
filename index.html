<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Produkcji – Dekkau</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Barlow+Condensed:wght@300;400;600;800&display=swap');

  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --text-dim: #7a8099;
    --accent: #4f8fff;

    --zamowienia: #fdab3d;
    --przygotowanie: #4f8fff;
    --produkcja: #9b59f5;
    --montaz: #e74c6e;

    --gotowe: #00c875;
    --w-trakcie: #fdab3d;
    --czeka: #555a6e;
    --brak: #007eb5;
    --w-miejscu: #df2f4a;

    --jacek: #4f8fff;
    --marek: #00c875;
    --tomek: #e74c6e;
    --anna: #fdab3d;
    --piotr: #9b59f5;
    --adam: #00c875;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ───── TOP BAR ───── */
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .topbar-sep { width: 1px; height: 24px; background: var(--border); }
  .topbar-title { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .topbar-live {
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim);
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gotowe); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* ───── STATUS TILES ───── */
  .tiles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    flex-shrink: 0;
    border-bottom: 2px solid var(--border);
  }
  .tile {
    background: var(--bg2);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .tile:hover { background: var(--bg3); }
  .tile.active { background: var(--bg3); }
  .tile-number {
    font-family: 'Rajdhani', sans-serif;
    font-size: 44px;
    font-weight: 700;
    line-height: 1;
  }
  .tile-info { flex: 1; }
  .tile-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); }
  .tile-sublabel { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .tile-bar { height: 3px; border-radius: 2px; margin-top: 6px; width: 100%; background: rgba(255,255,255,0.07); }
  .tile-bar-fill { height: 100%; border-radius: 2px; }
  .tile-zamowienia .tile-number { color: var(--zamowienia); }
  .tile-przygotowanie .tile-number { color: var(--przygotowanie); }
  .tile-produkcja .tile-number { color: var(--produkcja); }
  .tile-montaz .tile-number { color: var(--montaz); }
  .tile-zamowienia .tile-bar-fill { background: var(--zamowienia); }
  .tile-przygotowanie .tile-bar-fill { background: var(--przygotowanie); }
  .tile-produkcja .tile-bar-fill { background: var(--produkcja); }
  .tile-montaz .tile-bar-fill { background: var(--montaz); }

  /* ───── MAIN LAYOUT ───── */
  .main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
    gap: 1px;
    background: var(--border);
  }

  /* ───── LEFT: ZAMÓWIENIA ───── */
  .panel-left {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .panel-header-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .panel-header-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    margin-left: auto;
  }

  /* Column selector */
  .col-selector {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .col-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
    background: transparent;
    color: var(--text-dim);
  }
  .col-btn.active {
    background: rgba(79,143,255,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .col-btn:hover { border-color: rgba(79,143,255,0.4); color: var(--text); }

  /* Table */
  .orders-table-wrap {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
  }
  .orders-table-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
  .orders-table-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .orders-table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { background: var(--bg3); position: sticky; top: 0; z-index: 2; }
  thead th {
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 7px 12px; white-space: nowrap; }
  .order-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-gotowe { background: rgba(0,200,117,0.15); color: var(--gotowe); }
  .badge-w-trakcie { background: rgba(253,171,61,0.15); color: var(--w-trakcie); }
  .badge-czeka { background: rgba(85,90,110,0.3); color: var(--text-dim); }
  .badge-brak { background: rgba(0,126,181,0.15); color: var(--brak); }
  .badge-w-miejscu { background: rgba(223,47,74,0.15); color: var(--w-miejscu); }
  .badge-null { background: rgba(85,90,110,0.1); color: rgba(122,128,153,0.4); font-size:10px; }

  /* Main status (header tiles) */
  .main-status-badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 2px 8px; border-radius: 3px;
  }
  .ms-zamowienia { background: rgba(253,171,61,0.15); color: var(--zamowienia); }
  .ms-przygotowanie { background: rgba(79,143,255,0.15); color: var(--przygotowanie); }
  .ms-produkcja { background: rgba(155,89,245,0.15); color: var(--produkcja); }
  .ms-montaz { background: rgba(231,76,110,0.15); color: var(--montaz); }
  .ms-zrealizowane { background: rgba(0,200,117,0.1); color: rgba(0,200,117,0.5); }
  .ms-rozliczone { background: rgba(64,22,148,0.2); color: #7c5fc4; }

  /* ───── RIGHT: CALENDAR ───── */
  .panel-right {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .calendar-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }
  .calendar-wrap::-webkit-scrollbar { width: 4px; }
  .calendar-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .calendar-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .month-block { margin-bottom: 24px; }
  .month-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 8px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .month-year {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-head {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 0;
    letter-spacing: 1px;
  }
  .cal-day {
    min-height: 68px;
    background: var(--bg2);
    border-radius: 4px;
    border: 1px solid var(--border);
    padding: 4px;
    position: relative;
    overflow: hidden;
  }
  .cal-day.empty { background: transparent; border-color: transparent; }
  .cal-day.today { border-color: rgba(79,143,255,0.4); }
  .cal-day-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 3px;
  }
  .cal-day.today .cal-day-num { color: var(--accent); font-weight: 700; }

  .cal-event {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 5px;
    border-radius: 2px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  .ev-jacek { background: rgba(79,143,255,0.25); color: #a0c0ff; border-left: 2px solid var(--jacek); }
  .ev-adam { background: rgba(0,200,117,0.2); color: #7de8c0; border-left: 2px solid var(--adam); }
  .ev-default { background: rgba(155,89,245,0.2); color: #c0a0ff; border-left: 2px solid var(--piotr); }

  /* Legend */
  .cal-legend {
    padding: 8px 16px;
    display: flex;
    gap: 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* loading / error */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-logo">Dekkau</span>
  <div class="topbar-sep"></div>
  <span class="topbar-title">Dashboard Produkcji</span>
  <div class="topbar-live">
    <div class="live-dot"></div>
    <span id="last-update">ładowanie…</span>
  </div>
</div>

<!-- STATUS TILES -->
<div class="tiles" id="tiles">
  <div class="tile tile-zamowienia" onclick="filterStatus('all')">
    <div class="tile-number" id="cnt-all">—</div>
    <div class="tile-info">
      <div class="tile-label">Zamówienia</div>
      <div class="tile-sublabel">Wszystkie aktywne</div>
      <div class="tile-bar"><div class="tile-bar-fill" id="bar-all" style="width:100%"></div></div>
    </div>
  </div>
  <div class="tile tile-przygotowanie" onclick="filterStatus('Fundament / pomiar')">
    <div class="tile-number" id="cnt-przygotowanie">—</div>
    <div class="tile-info">
      <div class="tile-label">Przygotowanie</div>
      <div class="tile-sublabel">Fundament / pomiar</div>
      <div class="tile-bar"><div class="tile-bar-fill" id="bar-przygotowanie" style="width:0%"></div></div>
    </div>
  </div>
  <div class="tile tile-produkcja" onclick="filterStatus('Produkcja')">
    <div class="tile-number" id="cnt-produkcja">—</div>
    <div class="tile-info">
      <div class="tile-label">W Produkcji</div>
      <div class="tile-sublabel">Produkcja / Magazyn</div>
      <div class="tile-bar"><div class="tile-bar-fill" id="bar-produkcja" style="width:0%"></div></div>
    </div>
  </div>
  <div class="tile tile-montaz" onclick="filterStatus('Montaż')">
    <div class="tile-number" id="cnt-montaz">—</div>
    <div class="tile-info">
      <div class="tile-label">W Montażu</div>
      <div class="tile-sublabel">Aktywny montaż</div>
      <div class="tile-bar"><div class="tile-bar-fill" id="bar-montaz" style="width:0%"></div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: ZAMÓWIENIA -->
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-header-title">📦 Zamówienia</span>
      <span class="panel-header-count" id="orders-count">—</span>
    </div>
    <!-- KONFIGURATOR KOLUMN -->
    <div class="col-selector" id="col-selector"></div>
    <div class="orders-table-wrap">
      <div class="loading" id="orders-loading">
        <div class="spinner"></div>Ładowanie zamówień…
      </div>
      <table id="orders-table" style="display:none">
        <thead id="orders-thead"></thead>
        <tbody id="orders-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- RIGHT: CALENDAR -->
  <div class="panel-right">
    <div class="panel-header">
      <span class="panel-header-title">📅 Kalendarz Montażystów</span>
      <span class="panel-header-count" id="cal-count">—</span>
    </div>
    <div class="calendar-wrap" id="calendar-wrap">
      <div class="loading" id="cal-loading">
        <div class="spinner"></div>Ładowanie kalendarza…
      </div>
    </div>
    <div class="cal-legend" id="cal-legend"></div>
  </div>
</div>

<script>
const BOARD_ID = 9806895585;
const MCP_URL = "https://mcp.monday.com/mcp";

// ── Column definitions ──────────────────────────────────────────────
const STATUS_COLS = [
  { id: 'color_mkwnevts', label: 'Projekt' },
  { id: 'color_mm1qtcpa', label: 'Fundamenty' },
  { id: 'color_mkwj4418', label: 'Konstrukcja' },
  { id: 'color_mkwjsxje', label: 'Ściany' },
  { id: 'color_mkwnp06x', label: 'Malarnia' },
  { id: 'color_mm1qa6dc', label: 'Magazyn' },
  { id: 'color_mkwnf17j', label: 'Montaż' },
];

const DATE_COLS = [
  { id: 'date_mm1qt8ds', label: 'Data M1' },
  { id: 'date_mm1qejwn', label: 'Data M2' },
  { id: 'date_mm1qvjxa', label: 'Data M3' },
];

// Visible columns (configurable)
let visibleCols = new Set(['color_mkwnevts','color_mkwj4418','color_mkwnp06x','color_mm1qa6dc','color_mkwnf17j']);
let currentFilter = 'all';
let allItems = [];

// ── Status helpers ──────────────────────────────────────────────────
function statusBadge(val) {
  if (!val) return '<span class="badge badge-null">—</span>';
  const map = {
    'Gotowe': 'gotowe', 'W trakcie': 'w-trakcie', 'Czeka': 'czeka',
    'Brak': 'brak', 'W miejscu': 'w-miejscu'
  };
  const cls = map[val] || 'czeka';
  const short = val === 'W trakcie' ? 'W tr.' : val;
  return `<span class="badge badge-${cls}">${short}</span>`;
}

function mainStatusBadge(val) {
  if (!val) return '<span class="main-status-badge ms-przygotowanie">—</span>';
  const map = {
    'Fundament / pomiar': ['ms-przygotowanie', 'PRZYGOT.'],
    'Produkcja': ['ms-produkcja', 'PRODUKCJA'],
    'Magazyn': ['ms-produkcja', 'MAGAZYN'],
    'Montaż': ['ms-montaz', 'MONTAŻ'],
    'Zrealizowane': ['ms-zrealizowane', 'ZREALIZ.'],
    'Rozliczone': ['ms-rozliczone', 'ROZLICZ.'],
    'Projekt': ['ms-przygotowanie', 'PROJEKT'],
  };
  const [cls, lbl] = map[val] || ['ms-przygotowanie', val];
  return `<span class="main-status-badge ${cls}">${lbl}</span>`;
}

// ── Build column selector ────────────────────────────────────────────
function buildColSelector() {
  const cont = document.getElementById('col-selector');
  cont.innerHTML = '<span style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);align-self:center;">Kolumny:</span>';
  STATUS_COLS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'col-btn' + (visibleCols.has(c.id) ? ' active' : '');
    btn.textContent = c.label;
    btn.onclick = () => {
      if (visibleCols.has(c.id)) visibleCols.delete(c.id);
      else visibleCols.add(c.id);
      btn.classList.toggle('active');
      renderTable();
    };
    cont.appendChild(btn);
  });
}

// ── Update stat tiles ────────────────────────────────────────────────
function updateTiles(items) {
  const active = items.filter(i => !['Zrealizowane','Rozliczone'].includes(i.column_values.status9));
  const przygotowanie = active.filter(i => i.column_values.status9 === 'Fundament / pomiar');
  const produkcja = active.filter(i => ['Produkcja','Magazyn'].includes(i.column_values.status9));
  const montaz = active.filter(i => i.column_values.status9 === 'Montaż');

  const total = active.length || 1;
  document.getElementById('cnt-all').textContent = active.length;
  document.getElementById('cnt-przygotowanie').textContent = przygotowanie.length;
  document.getElementById('cnt-produkcja').textContent = produkcja.length;
  document.getElementById('cnt-montaz').textContent = montaz.length;

  document.getElementById('bar-przygotowanie').style.width = (przygotowanie.length/total*100)+'%';
  document.getElementById('bar-produkcja').style.width = (produkcja.length/total*100)+'%';
  document.getElementById('bar-montaz').style.width = (montaz.length/total*100)+'%';
}

// ── Render table ─────────────────────────────────────────────────────
function renderTable() {
  const items = currentFilter === 'all'
    ? allItems
    : currentFilter === 'Produkcja'
      ? allItems.filter(i => ['Produkcja','Magazyn'].includes(i.column_values.status9))
      : allItems.filter(i => i.column_values.status9 === currentFilter);

  document.getElementById('orders-count').textContent = `${items.length} zamówień`;

  const visArr = STATUS_COLS.filter(c => visibleCols.has(c.id));

  // Header
  let th = '<tr><th>Zamówienie</th><th>Status</th>';
  visArr.forEach(c => th += `<th>${c.label}</th>`);
  th += '</tr>';
  document.getElementById('orders-thead').innerHTML = th;

  // Body
  let rows = '';
  const sorted = [...items].sort((a,b) => {
    const order = ['Montaż','Produkcja','Magazyn','Fundament / pomiar','Projekt','Zrealizowane','Rozliczone'];
    return order.indexOf(a.column_values.status9) - order.indexOf(b.column_values.status9);
  });

  sorted.forEach(item => {
    const cv = item.column_values;
    let row = `<tr><td class="order-name" title="${item.name}">${item.name}</td>`;
    row += `<td>${mainStatusBadge(cv.status9)}</td>`;
    visArr.forEach(c => { row += `<td>${statusBadge(cv[c.id])}</td>`; });
    row += '</tr>';
    rows += row;
  });

  document.getElementById('orders-tbody').innerHTML = rows || '<tr><td colspan="20" style="text-align:center;color:var(--text-dim);padding:20px;">Brak zamówień</td></tr>';
  document.getElementById('orders-table').style.display = '';
  document.getElementById('orders-loading').style.display = 'none';
}

// ── Filter by tile ───────────────────────────────────────────────────
function filterStatus(status) {
  currentFilter = status;
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
  const map = { 'all':0, 'Fundament / pomiar':1, 'Produkcja':2, 'Montaż':3 };
  if (map[status] !== undefined) document.querySelectorAll('.tile')[map[status]].classList.add('active');
  renderTable();
}

// ── Calendar ─────────────────────────────────────────────────────────
const DAYS_PL = ['Pon','Wt','Śr','Czw','Pt','Sob','Nd'];
const MONTHS_PL = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];

function buildCalendar(items) {
  // Collect montaz events from items with dates
  const events = []; // { date, name, person }
  items.forEach(item => {
    const cv = item.column_values;
    DATE_COLS.forEach(dc => {
      if (cv[dc.id]) {
        events.push({
          date: cv[dc.id],
          name: item.name,
          person: cv.color_mm1q37tr || null,
          label: dc.label,
        });
      }
    });
  });

  // Group by month
  const months = {};
  events.forEach(ev => {
    const d = new Date(ev.date);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if (!months[key]) months[key] = { year: d.getFullYear(), month: d.getMonth(), days: {} };
    const day = d.getDate();
    if (!months[key].days[day]) months[key].days[day] = [];
    months[key].days[day].push(ev);
  });

  // If no events, show current month + next
  const today = new Date();
  if (Object.keys(months).length === 0) {
    const key1 = `${today.getFullYear()}-${today.getMonth()}`;
    months[key1] = { year: today.getFullYear(), month: today.getMonth(), days: {} };
    const next = new Date(today.getFullYear(), today.getMonth()+1, 1);
    const key2 = `${next.getFullYear()}-${next.getMonth()}`;
    months[key2] = { year: next.getFullYear(), month: next.getMonth(), days: {} };
  }

  // Sort months
  const sortedMonths = Object.values(months).sort((a,b) => a.year*12+a.month - (b.year*12+b.month));

  const wrap = document.getElementById('calendar-wrap');
  wrap.innerHTML = '';

  const eventCount = events.length;
  document.getElementById('cal-count').textContent = `${eventCount} terminów`;

  sortedMonths.forEach(mdata => {
    const { year, month, days } = mdata;
    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month+1, 0).getDate();
    // Monday-first offset
    const offset = (firstDay + 6) % 7;

    const block = document.createElement('div');
    block.className = 'month-block';
    block.innerHTML = `<div class="month-title">${MONTHS_PL[month]} <span class="month-year">${year}</span></div>`;

    const grid = document.createElement('div');
    grid.className = 'cal-grid';

    // Day headers
    DAYS_PL.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-head';
      h.textContent = d;
      grid.appendChild(h);
    });

    // Empty cells
    for (let i = 0; i < offset; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      grid.appendChild(e);
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isToday = today.getFullYear()===year && today.getMonth()===month && today.getDate()===d;
      cell.className = 'cal-day' + (isToday ? ' today' : '');

      let html = `<div class="cal-day-num">${d}</div>`;
      if (days[d]) {
        days[d].forEach(ev => {
          const person = (ev.person || '').toLowerCase();
          const evCls = person === 'jacek' ? 'ev-jacek' : person === 'adam' ? 'ev-adam' : 'ev-default';
          const short = ev.name.length > 16 ? ev.name.slice(0,14)+'…' : ev.name;
          html += `<div class="cal-event ${evCls}" title="${ev.name} – ${ev.label}">${short}</div>`;
        });
      }
      cell.innerHTML = html;
      grid.appendChild(cell);
    }

    block.appendChild(grid);
    wrap.appendChild(block);
  });

  // Legend - unique persons
  const persons = [...new Set(events.map(e => e.person).filter(Boolean))];
  const legend = document.getElementById('cal-legend');
  legend.innerHTML = '';
  const colorMap = { 'Jacek': 'var(--jacek)', 'Adam': 'var(--adam)' };
  persons.forEach(p => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const color = colorMap[p] || 'var(--piotr)';
    item.innerHTML = `<div class="legend-dot" style="background:${color}"></div><span style="color:var(--text-dim)">${p}</span>`;
    legend.appendChild(item);
  });
  if (!persons.length) legend.innerHTML = '<span style="color:var(--text-dim);font-size:11px;">Brak przypisanych ekip z datami</span>';
}

// ── Load data via Claude API ─────────────────────────────────────────
async function loadData() {
  const now = new Date();
  document.getElementById('last-update').textContent = `${now.toLocaleTimeString('pl-PL')} · odświeżono`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        system: `You are a monday.com data retrieval assistant. 
Fetch ALL items from board ${BOARD_ID} with columns: name, status9, color_mkwnevts, color_mm1qtcpa, color_mkwj4418, color_mkwjsxje, color_mkwnp06x, color_mm1qa6dc, color_mkwnf17j, date_mm1qt8ds, date_mm1qejwn, date_mm1qvjxa, color_mm1q37tr.
Use the get_board_items_page tool with includeColumns:true, limit:500.
Return ONLY a raw JSON array of items. No explanation, no markdown. Example format:
[{"id":"123","name":"test","column_values":{"status9":"Produkcja","color_mkwnevts":"Gotowe","color_mm1q37tr":"Jacek","date_mm1qt8ds":"2026-03-25"}}]`,
        messages: [{ role: 'user', content: `Fetch all items from monday board ${BOARD_ID} with all status and date columns. Return only JSON array.` }],
        mcp_servers: [{ type: 'url', url: MCP_URL, name: 'monday-mcp' }],
      })
    });

    const data = await resp.json();

    // Extract JSON array from response
    let items = null;
    for (const block of (data.content || [])) {
      if (block.type === 'text' && block.text) {
        const txt = block.text.trim().replace(/```json|```/g, '').trim();
        // try to find JSON array
        const match = txt.match(/\[[\s\S]*\]/);
        if (match) {
          try { items = JSON.parse(match[0]); break; } catch(e) {}
        }
      }
      // Also check tool results
      if (block.type === 'mcp_tool_result' && block.content?.[0]?.text) {
        try {
          const parsed = JSON.parse(block.content[0].text);
          if (parsed.items) { items = parsed.items; break; }
          if (Array.isArray(parsed)) { items = parsed; break; }
        } catch(e) {}
      }
    }

    if (!items || !items.length) throw new Error('No items in response');

    allItems = items;
    updateTiles(items);
    buildCalendar(items);
    renderTable();

  } catch (err) {
    console.warn('API error, using cached data:', err);
    // ── FALLBACK: embedded snapshot data ──
    useCachedData();
  }
}
